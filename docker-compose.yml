version: '3.8'

services:
  mcp-jsonpath-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: mcp-jsonpath-server 
    container_name: mcp-jsonpath-server
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
    volumes:
      # Монтируем директорию для логов
      - c:\_Work\ML\MCPJSON\mcp-jsonpath-server\logs:/app/logs
      # Монтируем директорию с JSON файлами (опционально)
      - c:\_Work\ML\MCPJSON\mcp-jsonpath-server\data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s