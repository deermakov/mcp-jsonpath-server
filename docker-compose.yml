version: '3.8'

services:
  mcp-json-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-jsonpath-server
    image: mcp-jsonpath-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Монтируем директорию с JSON-файлами
      - c:\_Work\ML\MCPJSON\mcp-jsonpath-server\data:/app/data:ro
      # Монтируем директорию для логов
      - c:\_Work\ML\MCPJSON\mcp-jsonpath-server\logs:/app/logs
    environment:
      - LOG_LEVEL=DEBUG
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
